---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "gitlabContext.name" . }}
    chart: {{ include "gitlabContext.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
    grafana_dashboard: "1"
  annotations:
    grafana_dashboard_folder: "/tmp/dashboards/Gitlab"
data:
{{ (.Files.Glob "dashboards/*.json").AsConfig | indent 2 }}
